<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مساعد البرومبت الخبير - حوّل أفكارك البسيطة إلى برومبتات احترافية متقدمة">
  <meta name="keywords" content="prompt, ai, chatgpt, prompt engineering, برومبت, ذكاء اصطناعي">
  <meta name="author" content="AI Prompt Agent">
  <meta name="theme-color" content="#6366f1">
  
  <title>مساعد البرومبت الخبير | Expert AI Prompt Agent</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/public/assets/styles.css">
  <link rel="stylesheet" href="/public/assets/animations.css">
  <link rel="stylesheet" href="/src/styles/main.css">
  
  <style>
    body {
      font-family: 'Cairo', 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-logo {
      font-size: 4rem;
      margin-bottom: 24px;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .loading-text {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(99, 102, 241, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #6366f1);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% { width: 0%; background-position: 0% 0%; }
      50% { width: 70%; background-position: 100% 0%; }
      100% { width: 100%; background-position: 0% 0%; }
    }

    /* Code Font */
    pre, code, .mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">🤖</div>
    <p class="loading-text">جاري تحميل مساعد البرومبت الخبير...</p>
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
  </div>

  <!-- App Container -->
  <div id="app"></div>
  
  <!-- Main Script -->
  <script type="module">
    import ExpertPromptAgentApp from '/expertApp.js';
    
    // Hide loading screen after app loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
        }
      }, 800);
    });
  </script>

  <!-- No-JS Fallback -->
  <noscript>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px;">
      <h1 style="color: #ef4444;">⚠️ JavaScript مطلوب</h1>
      <p style="color: #94a3b8;">يرجى تفعيل JavaScript لاستخدام مساعد البرومبت الخبير</p>
    </div>
  </noscript>
</body>
</html>
