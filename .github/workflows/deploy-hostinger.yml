name: Deploy Hostinger Frontend

on:
  push:
    branches: [main]
    paths:
      - 'ai-prompt-agent-core/src/**'
      - 'ai-prompt-agent-core/public/**'
      - 'ai-prompt-agent-core/index.html'
      - 'ai-prompt-agent-core/package.json'
      - 'ai-prompt-agent-core/package-lock.json'
      - 'ai-prompt-agent-core/vite.config.js'
      - 'ai-prompt-agent-core/tailwind.config.js'
      - 'ai-prompt-agent-core/postcss.config.js'
      - '.github/workflows/deploy-hostinger.yml'
  workflow_dispatch:

concurrency:
  group: hostinger-frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ai-prompt-agent-core
        run: npm ci

      - name: Build frontend
        working-directory: ai-prompt-agent-core
        run: npm run build

      - name: Install rsync + sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Deploy dist via SSH
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_TARGET_DIR: ${{ secrets.HOSTINGER_SERVER_DIR }}
          SSH_TARGET_DIR_LEGACY: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          TARGET_DIR="${SSH_TARGET_DIR:-$SSH_TARGET_DIR_LEGACY}"
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PASS" ] || [ -z "$TARGET_DIR" ]; then
            echo "Missing required secrets: HOSTINGER_SSH_HOST, HOSTINGER_SSH_PORT, HOSTINGER_SSH_USER, HOSTINGER_SSH_PASS, HOSTINGER_SERVER_DIR"
            exit 1
          fi

          sshpass -p "$SSH_PASS" rsync -az --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ai-prompt-agent-core/dist/ \
            "$SSH_USER@$SSH_HOST:$TARGET_DIR"
