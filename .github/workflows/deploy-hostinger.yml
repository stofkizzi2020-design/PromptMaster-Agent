name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install rsync + sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Deploy frontend dist with rsync over SSH
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
          PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          sshpass -p "$PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $PORT" \
            frontend/dist/ \
            "$USER@$HOST:$REMOTE_DIR"
